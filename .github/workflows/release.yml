name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install and build
      run: |
        npm ci
        npm run build

    - name: Create zip
      run: |
        VERSION="${{ github.ref_name }}"
        ZIP="orca-link-icons-plugin-${VERSION}.zip"

        STAGE=$(mktemp -d)
        cp package.json LICENSE icon.png "$STAGE/"
        cp README.md "$STAGE/" 2>/dev/null || true
        cp -r dist "$STAGE/"
        (cd "$STAGE" && zip -r "$GITHUB_WORKSPACE/$ZIP" .)

        echo "ZIP=$ZIP" >> "$GITHUB_ENV"
        echo "--- zip contents ---"
        unzip -l "$ZIP"

    - name: Publish release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ github.ref_name }}"
        gh release delete "$VERSION" --yes 2>/dev/null || true
        gh release create "$VERSION" \
          "${{ env.ZIP }}" \
          --title "Orca Link Icons Plugin $VERSION" \
          --generate-notes
